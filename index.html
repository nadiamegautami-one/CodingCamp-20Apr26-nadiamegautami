<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Life Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="container">

    <!-- Greeting -->
    <section class="card">
      <h2 id="greeting"></h2>
      <p id="datetime"></p>
    </section>

    <!-- Focus Timer -->
    <section class="card">
      <h3>Focus Timer</h3>
      <div id="timer">25:00</div>
      <div class="buttons">
        <button onclick="startTimer()">Start</button>
        <button onclick="stopTimer()">Stop</button>
        <button onclick="resetTimer()">Reset</button>
      </div>
    </section>

    <!-- To-Do List -->
    <section class="card">
      <h3>To-Do List</h3>
      <input type="text" id="taskInput" placeholder="Add task...">
      <button onclick="addTask()">Add</button>
      <button onclick="sortTasks()">Sort A-Z</button>
      <ul id="taskList"></ul>
    </section>

    <!-- Quick Links -->
    <section class="card">
      <h3>Quick Links</h3>
      <input type="text" id="linkName" placeholder="Name">
      <input type="url" id="linkURL" placeholder="URL">
      <button onclick="addLink()">Add</button>
      <ul id="linkList"></ul>
    </section>

    <!-- Dark Mode -->
    <button id="toggleMode">Toggle Dark Mode</button>

  </div>

  <script src="js/script.js"></script>
</body>
</html>
